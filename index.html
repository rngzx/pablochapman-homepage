<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pablo Chapman</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.28), transparent 35%),
        linear-gradient(135deg, #0f172a, #111827);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: 44px 30px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    .avatar {
      width: 92px;
      height: 92px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 12px 35px rgba(99, 102, 241, 0.45);
    }

    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.8;
    }

    .description {
      margin: 24px auto 0;
      max-width: 430px;
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.8;
    }

    .links {
      margin-top: 34px;
      display: grid;
      gap: 14px;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.25s ease;
    }

    .link-button:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.25);
    }

    .github {
      background: linear-gradient(135deg, #24292f, #111827);
    }

    .email {
      background: linear-gradient(135deg, #2563eb, #0891b2);
    }

    .footer {
      margin-top: 24px;
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 22px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 15px;
      }

      .description {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <div class="avatar">PC</div>

      <h1>Pablo Chapman</h1>

      <p class="subtitle">
        个人主页 · 项目展示 · 网络身份入口
      </p>

      <p class="description">
        欢迎来到我的个人主页。这里将用于展示我的项目、代码仓库以及未来的个人作品。
      </p>

      <div class="links">
        <a
          class="link-button github"
