<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pablo Chapman</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #111827, #312e81);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card {
      width: 90%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.08);
      padding: 40px 28px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #d1d5db;
      line-height: 1.7;
    }

    .links {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }

    a {
      display: block;
      padding: 14px;
      border-radius: 14px;
      color: white;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.14);
      transition: 0.2s;
    }

    a:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pablo Chapman</h1>
    <p>
      你好，这里是我的个人主页。<br>
      我会在这里展示我的项目、链接和个人信息。
    </p>

    <div class="links">
      <a href="https://github.com/" target="_blank">GitHub</a>
      <a href="https://www.notion.so/" target="_blank">Notion</a>
      <a href="mailto:your-email@example.com">联系我</a>
    </div>

    <div class="footer">
      pablochapman.ndjp.net
    </div>
  </div>
</body>
</html>
